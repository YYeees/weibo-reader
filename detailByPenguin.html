<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>微博阅览</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: oklch(88% 0.14 92); }
  * { box-sizing: border-box; }
  .wb-scroll::-webkit-scrollbar { width: 9px; height: 9px; }
  .wb-scroll::-webkit-scrollbar-thumb { background: oklch(72% 0.13 92); border-radius: 5px; }
  .wb-scroll::-webkit-scrollbar-track { background: transparent; }
  .wb-strip::-webkit-scrollbar { height: 0; }
  .wb-strip { scrollbar-width: none; }
  @keyframes chapterIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .month-prev-btn:hover { background: oklch(87% 0.055 68) !important; }
  .month-next-btn:hover { background: oklch(87% 0.055 68) !important; }
  #back-btn, #mobile-back { transition: background .18s ease, box-shadow .18s ease, transform .18s ease !important; }
  #back-btn:hover, #mobile-back:hover { background: oklch(93% 0.05 68) !important; box-shadow: 0 1px 0 rgba(0,0,0,.08) !important; transform: scale(1.08) !important; }
  #back-btn:active, #mobile-back:active { background: oklch(88% 0.08 68) !important; box-shadow: none !important; transform: scale(0.95) !important; }
</style>
</head>
<body>
<div id="root" style="position:fixed;inset:0;display:flex;flex-direction:row;font-family:'Noto Serif SC',serif;overflow:hidden;background-color:oklch(88% 0.14 92);"></div>

<div id="lightbox" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(22,16,4,0.86);align-items:center;justify-content:center;padding:20px;cursor:zoom-out;">
  <img id="lightbox-img" alt="" style="max-width:96vw;max-height:92vh;object-fit:contain;border-radius:12px;box-shadow:0 24px 70px rgba(0,0,0,.55);">
</div>

<script>
(function () {
  'use strict';

  // ---- state ----
  const allYears = [2019, 2020, 2021, 2022, 2023];
  const defaults = { accentColor: '#D97742', baseColor: 'oklch(88% 0.14 92)', panelOpacity: 0.66, cardOpacity: 0.82 };
  let local = {};
  let state = {
    loaded: false, data: null, activeIdx: 0,
    year: 2019, empty: false,
  };

  const params = new URLSearchParams(location.search);
  state.year = parseInt(params.get('year') || '2019', 10);
  localStorage.setItem('wb_last_year', String(state.year));

  function theme(key) {
    if (local[key] != null) return local[key];
    return defaults[key];
  }

  // ---- audio ----
  let ac = null, master = null, lp = null;

  function ensureAudio() {
    if (!ac) {
      const AC = window.AudioContext || window.webkitAudioContext;
      ac = new AC();
      master = ac.createGain(); master.gain.value = 0.32;
      lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 3200;
      lp.connect(master); master.connect(ac.destination);
    }
    if (ac.state === 'suspended') ac.resume();
  }

  function playNote(freq) {
    if (!freq) return;
    ensureAudio();
    const t = ac.currentTime;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.5, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0005, t + 1.3);
    g.connect(lp);
    const o = ac.createOscillator(); o.type = 'triangle'; o.frequency.value = freq; o.connect(g);
    o.start(t); o.stop(t + 1.4);
  }

  // ---- constants ----
  const freqs = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46, 783.99];
  const rots = ['-1.2deg', '0.8deg', '-0.6deg', '1deg', '-1deg', '0.7deg', '-0.9deg', '1.1deg', '-0.7deg', '1deg', '-1deg', '0.6deg'];
  const mn = {
    '01': ['一月', 'Jan'], '02': ['二月', 'Feb'], '03': ['三月', 'Mar'], '04': ['四月', 'Apr'],
    '05': ['五月', 'May'], '06': ['六月', 'Jun'], '07': ['七月', 'Jul'], '08': ['八月', 'Aug'],
    '09': ['九月', 'Sep'], '10': ['十月', 'Oct'], '11': ['十一月', 'Nov'], '12': ['十二月', 'Dec']
  };
  const allKeys = ['01', '02', '03', '04', '05', '06', '07', '08', '09', '10', '11', '12'];

  function isWide() { return window.innerWidth >= 760; }

  // ---- lightbox ----
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');

  // Global open function callable from inline onclick
  window.__wbOpenImg = function (src) {
    if (lb && lbImg) { lbImg.src = src; lb.style.display = 'flex'; }
  };

  function closeImg() {
    if (lb) lb.style.display = 'none';
    if (lbImg) lbImg.src = '';
  }

  if (lb) lb.addEventListener('click', closeImg);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeImg(); });

  // ---- data prep ----
  function prep(p) {
    const day = p.dt.slice(8, 10), mon = p.dt.slice(5, 7), yr = p.dt.slice(0, 4);
    const wk = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
    const weekday = wk[new Date(parseInt(yr, 10), parseInt(mon, 10) - 1, parseInt(day, 10)).getDay()];
    const cols = p.images.length === 1 ? 1 : (p.images.length === 2 || p.images.length === 4) ? 2 : 3;
    const rImgs = p.repost ? p.repost.images : [];
    const rcols = rImgs.length === 1 ? 1 : (rImgs.length === 2 || rImgs.length === 4) ? 2 : 3;
    return {
      id: p.id, text: p.text,
      dayNum: parseInt(day, 10), weekday, timeLabel: p.dt.slice(11, 16),
      hasImg: p.images.length > 0, images: p.images, cols,
      imgRatio: p.images.length === 1 ? '4 / 3' : '1',
      imgMaxW: p.images.length === 1 ? '340px' : '440px',
      hasRepost: !!p.repost, repostText: p.repost ? p.repost.text : '',
      repostHasImg: rImgs.length > 0, repostImages: rImgs, repostCols: rcols,
    };
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function loadYear(y) {
    fetch('data/weibo-' + y + '.json')
      .then(r => { if (!r.ok) throw new Error('no data'); return r.json(); })
      .then(d => {
        const fm = (d.months && d.months[0]) ? parseInt(d.months[0].split('-')[1], 10) - 1 : 0;
        state.loaded = true; state.data = d; state.activeIdx = fm; state.empty = false;
        render(); afterChange();
      })
      .catch(() => { state.loaded = true; state.data = null; state.empty = true; render(); });
  }

  // ---- navigation ----
  function goBack() { window.location.href = 'indexPenguin.html'; }

  function gotoYear(y) {
    const p = new URLSearchParams(location.search);
    p.set('year', y);
    window.location.search = p.toString();
  }

  function prevYear() {
    const i = allYears.indexOf(state.year);
    if (i > 0) gotoYear(allYears[i - 1]);
  }

  function nextYear() {
    const i = allYears.indexOf(state.year);
    if (i >= 0 && i < allYears.length - 1) gotoYear(allYears[i + 1]);
  }

  let btnTimer = null;

  function prevMonth() {
    clearTimeout(btnTimer);
    btnTimer = setTimeout(() => {
      state.activeIdx = Math.max(0, state.activeIdx - 1);
      render(); afterChange();
    }, 100);
  }

  function nextMonth() {
    clearTimeout(btnTimer);
    btnTimer = setTimeout(() => {
      state.activeIdx = Math.min(11, state.activeIdx + 1);
      render(); afterChange();
    }, 100);
  }

  function setMonth(e) {
    const el = e.currentTarget;
    const idx = parseInt(el.dataset.idx, 10);
    playNote(parseFloat(el.dataset.freq));
    state.activeIdx = idx;
    render(); afterChange();
  }

  // ---- theme ----
  function applyTheme() {
    const base = theme('baseColor');
    const panelOp = theme('panelOpacity');
    const cardOp = theme('cardOpacity');
    document.querySelectorAll('[data-basebg]').forEach(el => { el.style.background = base; });
    document.body.style.background = base;
    document.documentElement.style.background = base;
    document.querySelectorAll('[data-layer="panel"]').forEach(el => { el.style.background = 'rgba(255,255,255,' + panelOp + ')'; });
    document.querySelectorAll('[data-layer="card"]').forEach(el => { el.style.background = 'rgba(255,255,255,' + cardOp + ')'; });
  }

  function resetTheme() {
    local = Object.assign({}, defaults);
    applyTheme();
    highlightActive();
  }

  // ---- highlight active tab ----
  function highlightActive() {
    const idx = state.activeIdx;
    const accent = theme('accentColor');
    document.querySelectorAll('[data-mtab]').forEach(el => {
      const on = parseInt(el.dataset.idx, 10) === idx;
      const has = el.dataset.has !== 'false';
      if (el.dataset.ctx === 'vkey') {
        el.style.background = on ? accent : (has ? '#fff' : 'oklch(96.5% 0.014 92)');
        el.style.color = on ? '#fff' : '';
        el.style.opacity = (on || has) ? '1' : '0.5';
        el.style.transform = on ? 'translateX(9px)' : 'translateX(0)';
        el.style.boxShadow = on ? '-1px 4px 12px -3px rgba(120,60,0,.4)' : '-3px 5px 0 rgba(0,0,0,.10)';
      } else {
        el.style.background = on ? accent : (has ? '#fff' : 'oklch(96.5% 0.014 92)');
        el.style.color = on ? '#fff' : '';
        el.style.opacity = (on || has) ? '1' : '0.5';
        el.style.transform = on ? 'translateY(4px)' : 'translateY(0)';
        el.style.boxShadow = on ? '0 4px 10px -3px rgba(120,60,0,.4)' : '0 3px 0 rgba(0,0,0,.13)';
      }
    });
  }

  function afterChange() {
    highlightActive();
    const readEl = document.querySelector('[data-read]');
    if (readEl) readEl.scrollTop = 0;
    const page = document.querySelector('[data-page]');
    if (page) { page.style.animation = 'none'; void page.offsetWidth; page.style.animation = 'chapterIn .4s ease'; }
    const activeChip = document.querySelector('[data-mtab][data-idx="' + state.activeIdx + '"]');
    if (activeChip) activeChip.scrollIntoView({ behavior: 'instant', block: 'nearest', inline: 'center' });
  }

  // ---- render helpers ----
  function renderPostCards(posts, wide) {
    const cardW = wide ? '720px' : '100%';
    if (!posts.length) {
      return `<div data-layer="card" style="border-radius:18px;padding:38px 24px;width:${cardW};height:420px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;">
        <img src="penguin-ice.png" alt="" style="width:120px;height:auto;opacity:.95;filter:drop-shadow(0 4px 5px rgba(0,0,0,.12));">
        <div style="font-size:14px;color:oklch(52% 0.03 60);text-align:center;">这个月的微博还在整理中。</div>
      </div>`;
    }
    return posts.map(p => {
      const repostImgHTML = p.repostHasImg
        ? `<div style="display:grid;grid-template-columns:repeat(${p.repostCols},1fr);gap:6px;margin-top:10px;max-width:400px;">${p.repostImages.map(im => `<img src="${esc(im)}" loading="lazy" decoding="async" alt="" onclick="__wbOpenImg(this.src)" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;background:oklch(92% 0.01 92);cursor:zoom-in;">`).join('')}</div>`
        : '';
      const repostHTML = p.hasRepost
        ? `<div style="margin-top:12px;padding:12px 14px;background:oklch(97% 0.015 95);border-radius:12px;border-left:4px solid oklch(75% 0.183 55.934);">
            <div style="font-size:14.5px;line-height:1.78;color:oklch(40% 0.02 60);white-space:pre-wrap;text-wrap:pretty;font-family:Georgia">${esc(p.repostText)}</div>
            ${repostImgHTML}
           </div>`
        : '';
      const imgHTML = p.hasImg
        ? `<div style="display:grid;grid-template-columns:repeat(${p.cols},1fr);gap:6px;margin-top:12px;max-width:${p.imgMaxW};">${p.images.map(im => `<img src="${esc(im)}" loading="lazy" decoding="async" alt="" onclick="__wbOpenImg(this.src)" style="width:100%;aspect-ratio:${p.imgRatio};object-fit:cover;border-radius:10px;background:oklch(92% 0.01 92);cursor:zoom-in;">`).join('')}</div>`
        : '';
      return `
        <div data-layer="card" style="border-radius:15px;box-shadow:0 1px 2px rgba(0,0,0,.03),0 10px 26px -18px rgba(70,50,10,.28);border:1px solid rgba(255,255,255,0.7);padding:17px 20px 15px;width:${cardW};">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
            <div style="display:flex;align-items:baseline;gap:9px;">
              <div style="font:600 28px Georgia;color:oklch(45% 0.1 62);line-height:1;">${p.dayNum}</div>
              <div style="font:600 12.5px Georgia;color:oklch(54% 0.05 65);letter-spacing:.5px;">${esc(p.weekday)}</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;padding-top:5px;">
              <div style="width:6px;height:6px;border-radius:50%;background:oklch(72% 0.16 60);flex-shrink:0;"></div>
              <div style="font:600 12.5px Georgia;color:oklch(54% 0.05 65);letter-spacing:.5px;">${esc(p.timeLabel)}</div>
            </div>
          </div>
          <div style="font-size:14.5px;line-height:1.95;color:oklch(34% 0.012 67.558);margin-top:9px;white-space:pre-wrap;text-wrap:pretty;font-family:Georgia">${esc(p.text)}</div>
          ${repostHTML}
          ${imgHTML}
        </div>`;
    }).join('');
  }

  // ---- render ----
  function render() {
    const wide = isWide();
    const year = state.year;
    const d = state.data;
    const availSet = new Set(d ? (d.months || []).map(ym => ym.split('-')[1]) : []);
    const idx = Math.min(Math.max(state.activeIdx, 0), 11);
    const k = allKeys[idx];
    const posts = d ? d.posts.filter(p => p.ym === year + '-' + k).map(prep) : [];
    const monthCn = mn[k][0];
    const pageMark = '· 第 ' + (idx + 1) + ' / 12 月 ·';
    const hasPrev = idx > 0, hasNext = idx < 11;
    const cardW = wide ? '720px' : '100%';
    const base = theme('baseColor');

    // vertical piano key tabs (wide left column)
    const vTabsHTML = allKeys.map((mk, i) => {
      const hasData = availSet.has(mk);
      return `<div data-mtab="1" data-ctx="vkey" data-idx="${i}" data-has="${hasData}" data-freq="${freqs[i]}"
        style="position:relative;height:54px;background:#fff;border-radius:0 16px 18px 0;box-shadow:-3px 5px 0 rgba(0,0,0,.10);display:flex;align-items:center;padding:0 12px 0 22px;cursor:pointer;user-select:none;transition:transform .12s ease,background .12s ease,opacity .12s ease;rotate:${rots[i]};">
        <div style="font:700 23px 'Cormorant Garamond',serif;letter-spacing:2.5px;color:oklch(30% 0.05 62);line-height:1;">${mn[mk][1]}</div>
      </div>`;
    }).join('');

    // horizontal piano key strip (mobile)
    const hTabsHTML = allKeys.map((mk, i) => {
      const hasData = availSet.has(mk);
      return `<div data-mtab="1" data-ctx="hkey" data-idx="${i}" data-has="${hasData}" data-freq="${freqs[i]}"
        style="flex-shrink:0;width:72px;height:56px;background:#fff;border-radius:5px 5px 9px 9px;box-shadow:0 3px 0 rgba(0,0,0,.13);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;user-select:none;transition:transform .1s ease,background .1s ease,opacity .1s ease;">
        <div style="font:700 17px 'Cormorant Garamond',serif;letter-spacing:1.5px;color:oklch(30% 0.05 62);line-height:1;">${mn[mk][1]}</div>
      </div>`;
    }).join('');

    // reading panel
    let panelContent = '';
    if (state.empty) {
      panelContent = `
        <div style="max-width:560px;margin:12vh auto 0;text-align:center;">
          <img src="penguin-ice.png" alt="" style="width:140px;height:auto;filter:drop-shadow(0 5px 6px rgba(0,0,0,.16));">
          <div style="font:700 44px 'Caveat',cursive;color:oklch(40% 0.07 60);margin-top:6px;">${year}</div>
          <div style="font-size:16px;margin-top:8px;color:oklch(35% 0.04 60);">这一年的微博还在整理中。</div>
        </div>`;
    } else if (d) {
      const avatar = d.user ? d.user.avatar : '';
      const screenName = d.user ? d.user.screen_name : '';
      const desc = d.user ? d.user.description : '';
      panelContent = `
        <div data-page="1" data-layer="panel" style="max-width:800px;margin:0 auto;padding:${wide ? '22px 24px 30px 38px' : '14px 11px 26px'};min-height:calc(100% - 2px);-webkit-backdrop-filter:blur(24px) saturate(108%);backdrop-filter:blur(24px) saturate(108%);border:0px solid rgba(255,255,255,0.5);border-radius:15px;box-shadow:0 24px 60px -30px rgba(80,55,5,.5);">
          <div data-layer="card" style="-webkit-backdrop-filter:blur(10px) saturate(108%);backdrop-filter:blur(10px) saturate(108%);border-radius:15px;box-shadow:0 1px 2px rgba(0,0,0,.03),0 10px 26px -18px rgba(70,50,10,.28);border:1px solid rgba(255,255,255,0.7);display:flex;align-items:center;gap:13px;padding:15px 18px;margin-bottom:14px;width:${cardW};margin-top:12px;">
            ${avatar ? `<img src="${esc(avatar)}" alt="" style="width:46px;height:46px;border-radius:50%;object-fit:cover;">` : ''}
            <div style="flex:1;">
              <div style="font-size:17px;font-weight:700;color:oklch(20% 0.02 60);font-family:Georgia">${esc(screenName)}</div>
              <div style="font-size:12px;color:oklch(50% 0.02 60);font-family:Georgia">${esc(desc)}</div>
            </div>
            <div style="display:flex;align-items:baseline;gap:7px;padding:7px 14px;background:oklch(96.5% 0.013 92);border-radius:12px;">
              <span style="font:700 17px 'Noto Serif SC',serif;color:oklch(28% 0.03 60);font-family:Georgia">${monthCn}</span>
              <span style="font-size:11.5px;color:oklch(56% 0.04 65);font-family:Georgia">${posts.length} 条</span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:13px;width:${cardW};">
            ${renderPostCards(posts, wide)}
          </div>
          <div style="display:flex;align-items:center;gap:12px;padding:24px 0 4px;">
            <div class="month-prev-btn" style="visibility:${hasPrev ? 'visible' : 'hidden'};cursor:pointer;display:flex;align-items:center;gap:7px;padding:9px 17px;background:oklch(91% 0.045 70);border-radius:999px;box-shadow:0 2px 0 oklch(82% 0.05 68);color:oklch(46% 0.07 62);font-size:13.5px;font-weight:700;transition:background .15s ease,color .15s ease;font-family:Georgia;white-space:nowrap;">
              ‹ ${hasPrev ? mn[allKeys[idx - 1]][0] : mn[allKeys[0]][0]}
            </div>
            <div style="flex:1;text-align:center;font:700 13.5px 'Noto Serif SC',serif;color:oklch(60% 0.05 65);letter-spacing:1px;font-family:Georgia">${pageMark}</div>
            <div class="month-next-btn" style="visibility:${hasNext ? 'visible' : 'hidden'};cursor:pointer;display:flex;align-items:center;gap:7px;padding:9px 17px;background:oklch(91% 0.045 70);border-radius:999px;box-shadow:0 2px 0 oklch(82% 0.05 68);color:oklch(46% 0.07 62);font-size:13.5px;font-weight:700;transition:background .15s ease,color .15s ease;font-family:Georgia;white-space:nowrap;">
              ${hasNext ? mn[allKeys[idx + 1]][0] : mn[allKeys[11]][0]} ›
            </div>
          </div>
        </div>`;
    }

    const root = document.getElementById('root');
    root.innerHTML = `
      <!-- gutter penguin mascot (wide only, z-index -1 so it sits behind translucent panel) -->
      <div style="display:${wide ? 'flex' : 'none'};position:fixed;left:${172 - 78}px;bottom:4px;z-index:-1;align-items:flex-end;pointer-events:none;">
        <img src="penguin-ice.png" alt="" style="height:auto;filter:drop-shadow(0 8px 9px rgba(70,50,10,.18));width:300px;">
      </div>


      <!-- left piano column (wide only) -->
      <div style="display:${wide ? 'flex' : 'none'};width:172px;flex-shrink:0;flex-direction:column;align-items:stretch;padding:18px 10px 18px 16px;position:relative;background:transparent;height:100%;">
        <div style="display:flex;align-items:center;gap:10px;padding-right:8px;">
          <div id="back-btn" title="返回钢琴首页" style="cursor:pointer;width:38px;height:38px;border-radius:50%;background:#fff;box-shadow:0 3px 0 rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;font-size:19px;color:oklch(35% 0.05 60);">←</div>
        </div>
        <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin:14px 0 4px;">
          <div style="font:700 40px 'Caveat',cursive;color:oklch(28% 0.06 60);line-height:1;">${year}</div>
        </div>
        <div class="wb-strip" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:7px;padding:2px 24px 8px 0;">
          ${vTabsHTML}
        </div>
      </div>

      <!-- main column -->
      <div style="flex:1;min-width:0;display:flex;flex-direction:column;">

        <!-- mobile top bar -->
        <div data-basebg="1" style="display:${wide ? 'none' : 'flex'};flex-shrink:0;align-items:center;gap:10px;padding:0 14px;height:52px;">
          <div id="mobile-back" style="cursor:pointer;width:36px;height:36px;border-radius:50%;background:#fff;box-shadow:0 2px 0 rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;font-size:18px;color:oklch(35% 0.05 60);flex-shrink:0;">←</div>
          <div style="flex:1;display:flex;justify-content:center;">
            <div style="font:700 30px 'Caveat',cursive;color:oklch(26% 0.06 60);line-height:1;">${year}</div>
          </div>
          <div style="width:36px;flex-shrink:0;"></div>
        </div>

        <!-- mobile piano strip -->
        <div data-basebg="1" class="wb-strip" style="display:${wide ? 'none' : 'flex'};flex-shrink:0;gap:6px;overflow-x:auto;padding:6px 14px 12px;">
          ${hTabsHTML}
        </div>

        <!-- reading area -->
        <div data-read="1" class="wb-scroll" style="flex:1;overflow-y:auto;overflow-x:hidden;position:relative;padding:${wide ? '30px 28px 64px' : '0 10px 48px'};">
          ${panelContent}
        </div>
      </div>
    `;

    applyTheme();
    highlightActive();
    bindEvents();
  }

  function bindEvents() {
    document.querySelectorAll('[data-mtab]').forEach(el => {
      el.addEventListener('click', setMonth);
    });
    const backBtn = document.getElementById('back-btn');
    if (backBtn) backBtn.addEventListener('click', goBack);
    const mobileBack = document.getElementById('mobile-back');
    if (mobileBack) mobileBack.addEventListener('click', goBack);

    document.querySelectorAll('.month-prev-btn').forEach(el => el.addEventListener('click', prevMonth));
    document.querySelectorAll('.month-next-btn').forEach(el => el.addEventListener('click', nextMonth));
  }

  // ---- init ----
  render();
  loadYear(state.year);

  let resizeT;
  window.addEventListener('resize', () => {
    clearTimeout(resizeT);
    resizeT = setTimeout(() => { render(); afterChange(); }, 80);
  });
  window.addEventListener('orientationchange', () => {
    clearTimeout(resizeT);
    resizeT = setTimeout(() => { render(); afterChange(); }, 80);
  });
})();
</script>
</body>
</html>
