<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;height:100%;background:#16210f;}
  *{box-sizing:border-box;}
  .wb-scroll::-webkit-scrollbar{width:9px;height:9px;}
  .wb-scroll::-webkit-scrollbar-thumb{background:oklch(72% 0.13 92);border-radius:5px;}
  .wb-scroll::-webkit-scrollbar-track{background:transparent;}
  .wb-strip::-webkit-scrollbar{height:0;}
  .wb-strip{scrollbar-width:none;}
  .wb-scroll.mobile-sb{scrollbar-width:none;}
  .wb-scroll.mobile-sb::-webkit-scrollbar{width:4px;height:4px;}
  .wb-scroll.mobile-sb::-webkit-scrollbar-thumb{background:transparent;border-radius:4px;transition:background .5s ease;}
  .wb-scroll.mobile-sb.sbon::-webkit-scrollbar-thumb{background:rgba(60,70,40,0.34);}
  @keyframes chapterIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  #back-btn:hover{transform:translateY(-2px)!important;background:oklch(88% 0.14 92)!important;box-shadow:0 6px 14px -4px rgba(0,0,0,.32)!important;color:oklch(28% 0.08 60)!important;}
  #back-btn:active{transform:translateY(0)!important;box-shadow:0 2px 0 rgba(0,0,0,.12)!important;}
  #reset-btn:hover{background:oklch(96.5% 0.014 92)!important;}
  #mobile-back:hover{background:rgba(255,255,255,0.6)!important;}
  #mobile-back:active{background:rgba(255,255,255,0.28)!important;}
</style>
</head>
<body>
<div id="root" style="position:fixed; inset:0; display:flex; flex-direction:row; font-family:'Noto Serif SC',serif; overflow:hidden; background-color:transparent;"></div>

<script>
(function() {
  // ===== state =====
  let state = {
    loaded: false, data: null, activeIdx: 0,
    w: window.innerWidth, year: 2019, empty: false,
  };

  const defaults = { accentColor: '#D97742', panelOpacity: 0.42, cardOpacity: 0.34 };
  const local = {};

  function theme(key) {
    if (local[key] != null) return local[key];
    return defaults[key];
  }

  // ===== audio state =====
  let ac = null, master = null, lp = null;
  let windReady = false, windNoise = null;
  // ===== chime physics state =====
  let chimes = [], windState = null, _noise = 0, lastNow = 0, raf = null;
  let chimeStarted = false;

  // ===== constants =====
  const freqs = [261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25,587.33,659.25,698.46,783.99];
  const mn = {'01':['一月','Jan'],'02':['二月','Feb'],'03':['三月','Mar'],'04':['四月','Apr'],'05':['五月','May'],'06':['六月','Jun'],'07':['七月','Jul'],'08':['八月','Aug'],'09':['九月','Sep'],'10':['十月','Oct'],'11':['十一月','Nov'],'12':['十二月','Dec']};
  const allKeys = ['01','02','03','04','05','06','07','08','09','10','11','12'];
  const cv = [10,13,9,12,11,14,9,12,10,13,8,11];
  const tlt = [-4,5,-6,3,6,-3,-5,7,-2,4,-6,5];
  const hangVar = [-6,4,-3,6,-5,3,-4,5,-2,6,-5,3];
  const stag = [-1,0.7,-0.85,1,-0.6,0.9,-1,0.8,-0.7,1,-0.9,0.7];
  const scatter = 8, arc = 21, cardW = 120;
  const opVar = [1.0,0.86,1.08,0.92,1.05,0.8,1.1,0.9,1.0,0.84,1.07,0.94];
  const chipTilts = [-2.5,1.8,-3.2,2.6,-1.9,3.1,-2.3,1.5,-3.0,2.1,-1.6,2.8];

  function isWide() { return window.innerWidth >= 760; }

  function cardOpAt(i) {
    const base = 0.95;
    return Math.max(0.06, Math.min(0.95, base * opVar[i % 12]));
  }

  // ===== wind-chime physics =====
  function startChime() {
    if (chimeStarted) return;
    chimeStarted = true;
    chimes = [];
    for (let i = 0; i < 12; i++) {
      const f = i / 11;
      chimes.push({
        theta: (Math.random() * 2 - 1) * 0.012,
        omega: 0,
        w0: 3.5 - f * 0.8,
        damp: 0.52 - f * 0.16,
        drive: 1.0 + f * 0.18,
        lag: f * 0.7,
      });
    }
    windState = { mode: 'calm', dir: 1, strength: 0, start: 0, dur: 0,
                  next: performance.now() / 1000 + 4 + Math.random() * 5 };
    _noise = 0;
    lastNow = performance.now();
    const tick = (now) => {
      raf = requestAnimationFrame(tick);
      let dt = (now - lastNow) / 1000; lastNow = now;
      if (dt > 0.05) dt = 0.05; if (dt <= 0) return;
      const t = now / 1000;
      updateWind(t);
      _noise += (Math.random() * 2 - 1) * 0.6 * dt; _noise *= 0.95;
      const ws = windState;
      let env = 0;
      if (ws.mode !== 'calm') {
        const p = Math.max(0, Math.min(1, (t - ws.start) / ws.dur));
        env = Math.sin(p * Math.PI);
      }
      const gust = ws.mode === 'gust';
      const baseForce = ws.dir * ws.strength * env;
      for (let i = 0; i < chimes.length; i++) {
        const c = chimes[i];
        let shape;
        if (gust) shape = 0.7 + 0.55 * Math.sin(t * 2.3 - c.lag * 2.0) + 0.18 * Math.sin(t * 5.1 - i);
        else      shape = 0.85 + 0.28 * Math.sin(t * 1.4 - c.lag * 0.6);
        const wind = baseForce * c.drive * shape + _noise * 0.14;
        const alpha = -(c.w0 * c.w0) * Math.sin(c.theta) - c.damp * c.omega + wind;
        c.omega += alpha * dt;
        c.theta += c.omega * dt;
        if (c.theta > 0.92) { c.theta = 0.92; c.omega *= -0.3; }
        if (c.theta < -0.92) { c.theta = -0.92; c.omega *= -0.3; }
      }
      document.querySelectorAll('[data-chime]').forEach(el => {
        const c = chimes[parseInt(el.dataset.cidx, 10)];
        if (!c) return;
        el.style.transform = 'translateX(-50%) rotate(' + (c.theta * 57.2958).toFixed(2) + 'deg)';
      });
      updateWindSound(env, gust);
    };
    raf = requestAnimationFrame(tick);
  }

  function updateWind(t) {
    const ws = windState;
    if (ws.mode === 'calm') {
      if (t >= ws.next) {
        const gust = Math.random() < 0.3;
        ws.mode = gust ? 'gust' : 'breeze';
        ws.dir = Math.random() < 0.5 ? -1 : 1;
        ws.start = t;
        ws.dur = gust ? (4 + Math.random() * 4) : (2 + Math.random() * 2);
        ws.strength = gust ? (3.0 + Math.random() * 1.7) : (1.5 + Math.random() * 0.7);
        ensureWind();
      }
    } else if (t - ws.start >= ws.dur) {
      ws.mode = 'calm';
      ws.next = t + 8 + Math.random() * 12;
    }
  }

  function ensureAudio() {
    if (!ac) {
      const AC = window.AudioContext || window.webkitAudioContext;
      ac = new AC();
      master = ac.createGain(); master.gain.value = 0.32;
      lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 3200;
      lp.connect(master); master.connect(ac.destination);
    }
    if (ac.state === 'suspended') ac.resume();
  }

  function ensureWind() {
    if (windReady) return;
    try {
      ensureAudio();
      const dur = 2.5, len = Math.floor(ac.sampleRate * dur);
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      let last = 0;
      for (let i = 0; i < len; i++) { const wn = Math.random() * 2 - 1; last = (last + 0.02 * wn) / 1.02; d[i] = last * 3.2; }
      const src = ac.createBufferSource(); src.buffer = buf; src.loop = true;
      const lpf = ac.createBiquadFilter(); lpf.type = 'lowpass'; lpf.frequency.value = 420; lpf.Q.value = 0.6;
      const bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 500; bp.Q.value = 0.5;
      const g = ac.createGain(); g.gain.value = 0;
      const wm = ac.createGain(); wm.gain.value = 1.0;
      src.connect(lpf); lpf.connect(bp); bp.connect(g); g.connect(wm); wm.connect(ac.destination);
      src.start();
      windNoise = { src, lp: lpf, g };
      windReady = true;
    } catch(e) {}
  }

  function updateWindSound(env, gust) {
    if (!windReady) return;
    const targetGain = env * (gust ? 0.46 : 0.2);
    const targetFreq = 360 + env * (gust ? 560 : 220);
    const g = windNoise.g.gain, f = windNoise.lp.frequency;
    g.value += (targetGain - g.value) * 0.08;
    f.value += (targetFreq - f.value) * 0.05;
  }

  function playNote(freq) {
    if (!freq) return;
    ensureAudio();
    const t = ac.currentTime;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.5, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0005, t + 1.3);
    g.connect(lp);
    const o = ac.createOscillator(); o.type = 'triangle'; o.frequency.value = freq; o.connect(g);
    o.start(t); o.stop(t + 1.4);
  }

  // ===== data =====
  function loadYear(y) {
    fetch('data/weibo-' + y + '.json')
      .then(r => { if (!r.ok) throw new Error('no data'); return r.json(); })
      .then(d => {
        const fm = (d.months && d.months[0]) ? parseInt(d.months[0].split('-')[1], 10) - 1 : 0;
        state.loaded = true; state.data = d; state.activeIdx = fm; state.empty = false;
        render(); afterChange();
      })
      .catch(() => { state.loaded = true; state.data = null; state.empty = true; render(); });
  }

  function prep(p) {
    const day = p.dt.slice(8,10), mon = p.dt.slice(5,7), yr = p.dt.slice(0,4);
    const wk = ['周日','周一','周二','周三','周四','周五','周六'];
    const weekday = wk[new Date(parseInt(yr,10), parseInt(mon,10)-1, parseInt(day,10)).getDay()];
    const cols = p.images.length === 1 ? 1 : (p.images.length === 2 || p.images.length === 4) ? 2 : 3;
    const rImgs = p.repost ? p.repost.images : [];
    const rcols = rImgs.length === 1 ? 1 : (rImgs.length === 2 || rImgs.length === 4) ? 2 : 3;
    return {
      id: p.id, text: p.text,
      dayNum: parseInt(day,10), weekday, timeLabel: p.dt.slice(11,16),
      hasImg: p.images.length > 0, images: p.images, cols,
      hasRepost: !!p.repost, repostText: p.repost ? p.repost.text : '',
      repostHasImg: rImgs.length > 0, repostImages: rImgs, repostCols: rcols,
    };
  }

  // ===== event handlers =====
  function goBack() { window.location.href = '微博年份选择首页.html'; }

  function setMonth(e) {
    const el = e.currentTarget;
    const idx = parseInt(el.dataset.idx, 10);
    playNote(parseFloat(el.dataset.freq));
    ensureWind();
    if (chimes && chimes[idx]) chimes[idx].omega += (Math.random() < 0.5 ? -1 : 1) * 2.2;
    state.activeIdx = idx;
    render();
    afterChange();
  }

  function resetTheme() {
    Object.assign(local, defaults);
    applyTheme(); highlightActive();
  }

  function afterChange() {
    highlightActive();
    const read = document.querySelector('[data-read]');
    if (read) read.scrollTop = 0;
    const page = document.querySelector('[data-page]');
    if (page) { page.style.animation = 'none'; void page.offsetWidth; page.style.animation = 'chapterIn .4s ease'; }
  }

  // ===== highlightActive =====
  function highlightActive() {
    const idx = state.activeIdx;
    const accent = theme('accentColor');
    document.querySelectorAll('[data-mtab]').forEach(el => {
      const on = parseInt(el.dataset.idx, 10) === idx;
      const has = el.dataset.has !== 'false';
      if (el.dataset.ctx === 'vkey') {
        el.style.background = on ? accent : ('rgba(255,255,255,' + cardOpAt(parseInt(el.dataset.idx,10)).toFixed(3) + ')');
        el.style.color = on ? '#fff' : 'oklch(31% 0.105 44)';
        el.style.borderColor = on ? 'transparent' : 'rgba(255,255,255,0.5)';
        el.style.opacity = (on || has) ? '1' : '0.5';
        el.style.boxShadow = on ? '0 6px 14px -8px rgba(0,0,0,.5)' : '0 5px 12px -8px rgba(0,0,0,.42)';
      } else {
        el.style.background = on ? accent : ('rgba(255,255,255,' + cardOpAt(parseInt(el.dataset.idx,10)).toFixed(3) + ')');
        el.style.color = on ? '#fff' : 'oklch(31% 0.105 44)';
        el.style.borderColor = on ? 'transparent' : 'rgba(120,130,105,0.22)';
        el.style.opacity = (on || has) ? '1' : '0.55';
        el.style.boxShadow = on ? '0 5px 14px -6px rgba(180,90,30,.5)' : '0 3px 9px -5px rgba(40,40,25,.28)';
      }
    });
  }

  // ===== applyTheme =====
  function applyTheme() {
    const wide = isWide();
    const panelOp = theme('panelOpacity');
    const cardOp = theme('cardOpacity');
    const bgEl = document.querySelector('[data-bgphoto]');
    if (bgEl) {
      if (wide) {
        bgEl.style.backgroundImage = "url('assets/bg-bali.jpeg')";
        bgEl.style.backgroundPosition = 'center 66%';
        bgEl.style.filter = 'blur(1px) saturate(1.22) brightness(0.92)';
      } else {
        bgEl.style.backgroundImage = "url('uploads/bali-8477.jpg')";
        bgEl.style.backgroundPosition = 'center 40%';
        bgEl.style.filter = 'blur(1px) saturate(1.08) brightness(1.02)';
      }
    }
    document.querySelectorAll('[data-veil]').forEach(el => {
      el.style.background = wide
        ? 'linear-gradient(180deg, rgba(12,20,8,0.22) 0%, rgba(10,18,6,0.18) 50%, rgba(10,18,6,0.38) 100%)'
        : 'none';
    });
    document.querySelectorAll('[data-layer="panel"]').forEach(el => {
      if (wide) {
        el.style.background = 'rgba(255,255,255,' + panelOp + ')';
        el.style.backdropFilter = 'blur(24px) saturate(108%)';
        el.style.webkitBackdropFilter = 'blur(24px) saturate(108%)';
        el.style.border = '1px solid rgba(255,255,255,0.5)';
        el.style.boxShadow = '0 24px 60px -30px rgba(80,55,5,.5)';
        el.style.padding = '22px 24px 30px';
        el.style.paddingLeft = '38px';
        el.style.marginTop = '15px';
        el.style.marginBottom = '15px';
      } else {
        el.style.background = 'transparent';
        el.style.backdropFilter = 'none';
        el.style.webkitBackdropFilter = 'none';
        el.style.border = 'none';
        el.style.boxShadow = 'none';
        el.style.padding = '4px 7px 40px';
        el.style.marginTop = '4px';
        el.style.marginBottom = '0';
      }
    });
    document.querySelectorAll('[data-layer="card"]').forEach(el => {
      if (wide) {
        el.style.background = 'rgba(255,250,242,' + cardOp + ')';
        el.style.backdropFilter = 'blur(18px) saturate(1.18)';
        el.style.webkitBackdropFilter = 'blur(18px) saturate(1.18)';
        el.style.border = '1px solid rgba(255,243,226,0.55)';
        el.style.boxShadow = '0 1px 2px rgba(0,0,0,.03), 0 14px 34px -22px rgba(70,50,10,.4)';
      } else {
        const mop = 0.88;
        el.style.background = 'rgba(252,250,255,' + mop + ')';
        el.style.backdropFilter = 'blur(14px) saturate(1.1)';
        el.style.webkitBackdropFilter = 'blur(14px) saturate(1.1)';
        el.style.border = '1px solid rgba(255,255,255,0.6)';
        el.style.boxShadow = '0 4px 18px -10px rgba(40,30,60,.28)';
      }
    });
    document.querySelectorAll('[data-body]').forEach(el => {
      const quote = el.dataset.body === 'quote';
      el.style.fontSize = wide ? '14.5px' : (quote ? '15px' : '16px');
      el.style.lineHeight = wide ? (quote ? '1.78' : '1.95') : (quote ? '1.85' : '1.9');
      el.style.fontFamily = wide ? 'Georgia' : "'PingFang SC', -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif";
      el.style.letterSpacing = wide ? '' : '0.2px';
    });
    document.querySelectorAll('[data-ctx="hkey"]').forEach((el, i) => {
      el.style.transform = 'rotate(' + chipTilts[i % 12] + 'deg)';
    });
    const read = document.querySelector('[data-read]');
    if (read) read.classList.toggle('mobile-sb', !wide);
  }

  // ===== render =====
  function buildMonthTabs() {
    const d = state.data;
    const availSet = new Set(d ? (d.months || []).map(ym => ym.split('-')[1]) : []);
    return allKeys.map((k, i) => ({
      idx: i, k, en: mn[k][1], freq: freqs[i],
      hasData: availSet.has(k),
      cordH: cv[i], tilt: tlt[i] + 'deg',
      hangX: 45 + hangVar[i],
      ox: Math.round(stag[i] * scatter),
      bg: 'rgba(255,255,255,' + cardOpAt(i).toFixed(3) + ')',
      brad: '8px ' + arc + 'px ' + arc + 'px 8px',
    }));
  }

  function renderPosts() {
    const d = state.data;
    if (!d) return '';
    const idx = Math.min(Math.max(state.activeIdx, 0), 11);
    const k = allKeys[idx];
    const ym = state.year + '-' + k;
    const posts = d.posts.filter(p => p.ym === ym).map(p => prep(p));
    return posts;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function renderPostCards(posts) {
    if (!posts.length) return `
      <div data-layer="card" style="border-radius:18px; padding:38px 24px; width:100%; height:440px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;">
        <div style="font-size:14px; color:oklch(52% 0.03 60); text-align:center; font-family:Georgia">这个月的微博还在整理中。</div>
      </div>`;
    return posts.map(p => `
      <div data-layer="card" style="border-radius:20px; padding:17px 20px 15px; width:100%;">
        <div style="display:flex; align-items:baseline; gap:10px;">
          <div style="font:600 25px Georgia; color:oklch(45% 0.1 62); line-height:1;">${p.dayNum}</div>
          <div style="font:600 12.5px Georgia; color:oklch(56% 0.04 65); letter-spacing:.4px;">${esc(p.weekday)}<span style="margin:0 7px; opacity:.45;">·</span>${esc(p.timeLabel)}</div>
        </div>
        <div data-body="post" style="font-size:14.5px; line-height:1.50; color:oklch(34% 0.012 67.558); margin-top:9px; white-space:pre-wrap; text-wrap:pretty; font-family:Georgia; text-align:left">${esc(p.text)}</div>
        ${p.hasRepost ? `
        <div style="margin-top:12px; padding:12px 14px; background:rgba(255,251,242,0.42); border-radius:12px; border-left:4px solid oklch(75% 0.183 55.934 / 0.7);">
          <div data-body="quote" style="font-size:14.5px; line-height:1.78; color:oklch(40% 0.02 60); white-space:pre-wrap; text-wrap:pretty; font-family:Georgia">${esc(p.repostText)}</div>
          ${p.repostHasImg ? `<div style="display:grid; grid-template-columns:repeat(${p.repostCols},1fr); gap:6px; margin-top:10px; max-width:400px;">${p.repostImages.map(im=>`<img src="${esc(im)}" loading="lazy" decoding="async" alt="" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; background:oklch(92% 0.01 92);">`).join('')}</div>` : ''}
        </div>` : ''}
        ${p.hasImg ? `<div style="display:grid; grid-template-columns:repeat(${p.cols},1fr); gap:6px; margin-top:12px; max-width:440px;">${p.images.map(im=>`<img src="${esc(im)}" loading="lazy" decoding="async" alt="" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:10px; background:oklch(92% 0.01 92);">`).join('')}</div>` : ''}
      </div>`).join('');
  }

  function render() {
    const wide = isWide();
    const year = state.year;
    const tabs = buildMonthTabs();
    const idx = Math.min(Math.max(state.activeIdx, 0), 11);
    const k = allKeys[idx];
    const posts = state.data ? renderPosts() : [];
    const hasPosts = posts.length > 0;
    const monthCn = mn[k][0];
    const postCount = posts.length;
    const pageMark = '· 第 ' + (idx + 1) + ' / 12 月 ·';

    const root = document.getElementById('root');
    root.innerHTML = `
      <div data-bgphoto="1" aria-hidden="true" style="position:fixed; inset:-6px; z-index:-3; background-image:url('assets/bg-bali.jpeg'); background-size:cover; background-position:center 66%; filter:blur(1px) saturate(1.22) brightness(0.92); transform:scale(1.0);"></div>
      <div data-veil="1" aria-hidden="true" style="position:fixed; inset:0; z-index:-2; background:linear-gradient(180deg, rgba(12,20,8,0.22) 0%, rgba(10,18,6,0.18) 50%, rgba(10,18,6,0.38) 100%);"></div>

      <div id="reset-btn" title="恢复三层颜色默认值" style="position:fixed; right:18px; bottom:18px; z-index:50; display:${wide?'flex':'none'}; align-items:center; gap:7px; padding:9px 15px; border-radius:999px; background:#fff; color:oklch(38% 0.06 60); box-shadow:0 4px 14px -4px rgba(70,50,10,.35), 0 1px 0 rgba(0,0,0,.06); border:1px solid rgba(0,0,0,.05); cursor:pointer; user-select:none; font:600 13px 'Noto Serif SC',serif;">
        <span style="font-size:15px; line-height:1;">↺</span>
        <span>恢复默认</span>
      </div>

      <!-- left piano column (wide only) -->
      <div style="display:${wide?'flex':'none'}; width:220px; flex-shrink:0; flex-direction:column; align-items:stretch; padding:18px 0 18px 16px; position:relative; background:transparent; padding-right:10px; height:740px;">
        <div style="display:flex; align-items:center; gap:10px; padding-right:8px;">
          <div id="back-btn" title="返回年份选择首页" style="cursor:pointer; width:38px; height:38px; border-radius:50%; background:#fff; box-shadow:0 3px 0 rgba(0,0,0,.12); display:flex; align-items:center; justify-content:center; font-size:17px; color:oklch(35% 0.05 60); transition:transform .18s cubic-bezier(0,0,.2,1), background-color .18s ease, box-shadow .18s ease, color .18s ease;">↩</div>
        </div>
        <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin:14px 0 6px; transform:translateX(45px);">
          <div style="font:700 44px 'Caveat',cursive; color:oklch(96% 0.045 92); line-height:1; text-shadow:0 1px 1px rgba(0,0,0,.45), 0 2px 10px rgba(35,22,4,.5);">${year}</div>
        </div>
        <div class="wb-strip" style="position:relative; flex:1; overflow:visible; display:flex; flex-direction:column; padding:4px 8px 8px;">
          <div aria-hidden="true" style="position:absolute; left:calc(50% + 45px); top:4px; width:150px; transform:translateX(-50%); height:1px; background:linear-gradient(90deg, transparent, rgba(255,247,232,0.5) 20%, rgba(255,247,232,0.5) 80%, transparent); z-index:1;"></div>
          ${tabs.map(m => `
          <div style="position:relative; flex:1; min-height:0; z-index:2;">
            <div data-chime="1" data-cidx="${m.idx}" style="position:absolute; left:calc(50% + ${m.hangX}px); top:0; transform-origin:top center; transform:translateX(-50%) rotate(0deg); display:flex; flex-direction:column; align-items:center; will-change:transform;">
              <div style="width:0; height:${m.cordH}px; border-left:1px solid rgba(255,255,255,0.45);"></div>
              <div data-mtab="1" data-ctx="vkey" data-idx="${m.idx}" data-has="${m.hasData}" data-freq="${m.freq}" style="position:relative; width:${cardW}px; height:38px; rotate:${m.tilt}; transform:translateX(${m.ox}px); background:${m.bg}; color:oklch(31% 0.105 44); border:1px solid rgba(255,255,255,0.5); border-radius:${m.brad}; box-shadow:0 5px 12px -8px rgba(0,0,0,.42); display:flex; align-items:center; justify-content:center; padding:0 14px; cursor:pointer; user-select:none; transition:background .15s ease, color .15s ease, border-color .15s ease, opacity .15s ease; overflow:hidden;">
                <div style="font:700 20px 'Cormorant Garamond',serif; letter-spacing:2px; color:inherit; line-height:1; text-shadow:0 1px 0 rgba(255,255,255,0.5);">${m.en}</div>
              </div>
            </div>
          </div>`).join('')}
        </div>
      </div>

      <!-- main reading column -->
      <div style="flex:1; min-width:0; display:flex; flex-direction:column;">

        <!-- mobile top bar -->
        <div style="display:${wide?'none':'flex'}; flex-shrink:0; align-items:center; gap:10px; padding:0 14px; height:54px; background:linear-gradient(180deg, rgba(220,215,230,0.72), rgba(210,208,222,0.55)); -webkit-backdrop-filter:blur(20px) saturate(1.15); backdrop-filter:blur(20px) saturate(1.15);">
          <div id="mobile-back" style="cursor:pointer; display:flex; align-items:center; gap:4px; padding:3px 12px 6px; border-radius:7px; background:rgba(255,255,255,0.38); border:0; flex-shrink:0; transition:background .15s ease;">
            <span style="font-size:15px; line-height:1; color:oklch(28% 0.04 290); font-weight:700; font-family:Verdana">⟨</span>
          </div>
          <div style="display:flex; align-items:center; margin:0 auto;">
            <div style="font:700 28px Georgia; color:oklch(41% 0.112 45.904); line-height:1;">${year}</div>
          </div>
          <div style="width:52px; flex-shrink:0;"></div>
        </div>

        <!-- mobile month chips -->
        <div class="wb-strip" style="display:${wide?'none':'flex'}; flex-shrink:0; gap:4px; overflow-x:auto; padding:10px 14px 10px; -webkit-backdrop-filter:blur(20px) saturate(1.15); backdrop-filter:blur(20px) saturate(1.15);">
          ${tabs.map(m => `
          <div data-mtab="1" data-ctx="hkey" data-idx="${m.idx}" data-has="${m.hasData}" data-freq="${m.freq}" style="flex-shrink:0; width:80px; height:45px; background:rgba(255,255,255,0.88); color:oklch(31% 0.105 44); border:1px solid rgba(255,255,255,0.6); border-radius:12px; box-shadow:0 3px 9px -5px rgba(40,30,60,.22); display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; transition:background .15s ease, color .15s ease, border-color .15s ease, opacity .15s ease, box-shadow .15s ease;">
            <div style="font:700 20px 'Cormorant Garamond',serif; letter-spacing:2px; line-height:1; color:inherit;">${m.en}</div>
          </div>`).join('')}
        </div>

        <!-- reading area -->
        <div data-read="1" class="wb-scroll" style="flex:1; overflow-y:auto; overflow-x:hidden; position:relative; padding:${wide?'30px 28px 64px':'0 6px 36px'};">
          ${state.empty ? `
          <div style="max-width:560px; margin:12vh auto 0; text-align:center;">
            <div style="font:700 44px 'Caveat',cursive; color:oklch(40% 0.07 60); margin-top:6px;">${year}</div>
            <div style="font-size:16px; margin-top:8px; color:oklch(35% 0.04 60);">这一年的微博还在整理中。</div>
          </div>` : (!state.data ? '' : `
          <div data-page="1" data-layer="panel" style="max-width:800px; margin:0 auto; min-height:calc(100% - 2px);">

            <div data-layer="card" style="display:flex; align-items:center; gap:13px; border-radius:15px; padding:15px 18px; margin-bottom:14px; width:100%; max-width:720px; margin-top:8px;">
              <img src="assets/weibo/img/avatar.webp" alt="" style="width:46px; height:46px; border-radius:50%; object-fit:cover;">
              <div style="flex:1;">
                <div style="font-size:17px; font-weight:700; color:oklch(20% 0.02 60); font-family:Georgia">中二怪</div>
                <div style="font-size:12px; color:oklch(50% 0.02 60); font-family:Georgia">Made of sterner stuff</div>
              </div>
              <div style="display:flex; align-items:baseline; gap:7px; padding:7px 14px; background:oklch(96.5% 0.013 92); border-radius:12px;">
                <span style="font:700 17px Georgia; color:oklch(28% 0.03 60);">${monthCn}</span>
                <span style="font-size:11.5px; color:oklch(56% 0.04 65); font-family:Georgia">${postCount} 条</span>
              </div>
            </div>

            <div style="display:flex; flex-direction:column; gap:13px; width:100%; max-width:720px;">
              ${renderPostCards(posts)}
            </div>

            <div style="display:${wide?'flex':'none'}; align-items:center; gap:12px; padding:24px 0 4px;">
              <div style="flex:1; text-align:center; font:700 13.5px Georgia; color:oklch(60% 0.05 65); letter-spacing:1px;">${pageMark}</div>
            </div>

          </div>`)}
        </div>
      </div>
    `;

    // bind events
    document.querySelectorAll('[data-mtab]').forEach(el => {
      el.addEventListener('click', setMonth);
    });
    const backBtn = document.getElementById('back-btn');
    if (backBtn) backBtn.addEventListener('click', goBack);
    const mobileBack = document.getElementById('mobile-back');
    if (mobileBack) mobileBack.addEventListener('click', goBack);
    const resetBtn = document.getElementById('reset-btn');
    if (resetBtn) resetBtn.addEventListener('click', resetTheme);

    const readEl = document.querySelector('[data-read]');
    if (readEl) {
      let sbT;
      readEl.addEventListener('scroll', () => {
        readEl.classList.add('sbon');
        clearTimeout(sbT);
        sbT = setTimeout(() => readEl.classList.remove('sbon'), 650);
      }, { passive: true });
    }

    applyTheme();
    highlightActive();
  }

  // ===== init =====
  const params = new URLSearchParams(location.search);
  state.year = parseInt(params.get('year') || '2019', 10);

  render();
  loadYear(state.year);

  if (isWide()) {
    const wake = () => { ensureWind(); document.removeEventListener('pointerdown', wake); };
    document.addEventListener('pointerdown', wake, { once: true });
    try { startChime(); } catch(e) { console.error('chime', e); }
  }

  window.addEventListener('resize', () => {
    state.w = window.innerWidth;
    render();
    afterChange();
    if (isWide() && !chimeStarted) {
      try { startChime(); } catch(e) {}
    }
  });

  window.addEventListener('orientationchange', () => {
    state.w = window.innerWidth;
    render();
    afterChange();
  });
})();
</script>
</body>
</html>
