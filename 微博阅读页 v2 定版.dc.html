<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&amp;family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&amp;family=Noto+Serif+SC:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    html,body{margin:0;padding:0;height:100%;background:#16210f;}
    *{box-sizing:border-box;}
    .wb-scroll::-webkit-scrollbar{width:9px;height:9px;}
    .wb-scroll::-webkit-scrollbar-thumb{background:oklch(72% 0.13 92);border-radius:5px;}
    .wb-scroll::-webkit-scrollbar-track{background:transparent;}
    .wb-strip::-webkit-scrollbar{height:0;}
    .wb-strip{scrollbar-width:none;}
    /* mobile reading scrollbar: transparent, fades in only while scrolling */
    .wb-scroll.mobile-sb{scrollbar-width:none;}
    .wb-scroll.mobile-sb::-webkit-scrollbar{width:4px;height:4px;}
    .wb-scroll.mobile-sb::-webkit-scrollbar-thumb{background:transparent;border-radius:4px;transition:background .5s ease;}
    .wb-scroll.mobile-sb.sbon::-webkit-scrollbar-thumb{background:rgba(60,70,40,0.34);}
    @keyframes chapterIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  </style>
</helmet>

<div style="position: fixed; inset: 0; display: flex; flex-direction: row; font-family: 'Noto Serif SC',serif; overflow: hidden; background-color: transparent">

  <!-- ===== photo backdrop: softly hazy, still readable ===== -->
  <div data-bgphoto="1" aria-hidden="true" style="position:fixed; inset:-6px; z-index:-3; background-image:url('assets/bg-bali.jpeg'); background-size:cover; background-position:center {{ bgPosY }}; filter:{{ bgFilter }}; transform:scale(1.0);"></div>
  <!-- legibility veil — dark on desktop only; mobile shows photo clean (set in applyTheme) -->
  <div data-veil="1" aria-hidden="true" style="position:fixed; inset:0; z-index:-2; background:linear-gradient(180deg, rgba(12,20,8,0.22) 0%, rgba(10,18,6,0.18) 50%, rgba(10,18,6,0.38) 100%);"></div>

  <!-- ===== decorative background layer (behind feed): gradient + dot texture + iceberg ===== -->
  <div style="display:{{ decorDisplay }}; position:fixed; inset:0; z-index:-1; pointer-events:none; overflow:hidden;">
    <!-- soft light + warm depth -->
    <div style="position:absolute; inset:0; background:{{ decorGradient }};"></div>
    <!-- faint dot texture -->
    <div style="position:absolute; inset:0; opacity:{{ decorDotOpacity }}; background-image:radial-gradient(oklch(40% 0.06 60) 1px, transparent 1.2px); background-size:30px 30px;"></div>
    <!-- iceberg peeking from top-right -->
    <img src="iceberg.png" alt="" style="position:absolute; top:{{ icebergTop }}; right:-26px; width:{{ icebergW }}; height:auto; opacity:{{ icebergOpacity }}; filter:{{ icebergFilter }};">
  </div>

  <!-- restore-defaults button -->
  <div onClick="{{ resetTheme }}" title="恢复三层颜色默认值" style="position:fixed; right:18px; bottom:18px; z-index:50; display:{{ resetDisplay }}; align-items:center; gap:7px; padding:9px 15px; border-radius:999px; background:#fff; color:oklch(38% 0.06 60); box-shadow:0 4px 14px -4px rgba(70,50,10,.35), 0 1px 0 rgba(0,0,0,.06); border:1px solid rgba(0,0,0,.05); cursor:pointer; user-select:none; font:600 13px 'Noto Serif SC',serif;" style-hover="background:oklch(96.5% 0.014 92);">
    <span style="font-size:15px; line-height:1;">↺</span>
    <span>恢复默认</span>
  </div>


  <!-- gutter mascot removed -->

  <!-- ===== left piano column (wide only) ===== -->
  

  <!-- ===== main column ===== -->
  <div style="display: {{ colDisplay }}; width: 220px; flex-shrink: 0; flex-direction: column; align-items: stretch; padding: 18px 0 18px 16px; position: relative; background: transparent; padding-right: 10px; height: 740px">

    <div style="display:flex; align-items:center; gap:10px; padding-right:8px;">
      <div onClick="{{ back }}" title="返回年份选择首页" style="cursor:pointer; width:38px; height:38px; border-radius:50%; background:#fff; box-shadow:0 3px 0 rgba(0,0,0,.12); display:flex; align-items:center; justify-content:center; font-size:17px; color:oklch(35% 0.05 60); transition:transform .18s cubic-bezier(0,0,.2,1), background-color .18s ease, box-shadow .18s ease, color .18s ease;" style-hover="transform:translateY(-2px); background:oklch(88% 0.14 92); box-shadow:0 6px 14px -4px rgba(0,0,0,.32); color:oklch(28% 0.08 60);" style-active="transform:translateY(0); box-shadow:0 2px 0 rgba(0,0,0,.12);">↩</div>
    </div>
    <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin:14px 0 6px; transform:translateX(45px);">
      
      <div style="font:700 44px 'Caveat',cursive; color:oklch(96% 0.045 92); line-height:1; text-shadow:0 1px 1px rgba(0,0,0,.45), 0 2px 10px rgba(35,22,4,.5);">{{ year }}</div>
      
    </div>
    
    <div class="wb-strip" style="position:relative; flex:1; overflow:visible; display:flex; flex-direction:column; padding:4px 8px 8px;">
      <!-- top rail: a soft warm thread that fades at both ends, in keeping with the hazy page -->
      <div aria-hidden="true" style="position:absolute; left:calc(50% + 45px); top:4px; width:150px; transform:translateX(-50%); height:1px; background:linear-gradient(90deg, transparent, rgba(255,247,232,0.5) 20%, rgba(255,247,232,0.5) 80%, transparent); z-index:1;"></div>
      <sc-for list="{{ monthTabs }}" as="m" hint-placeholder-count="2">
        <div style="position:relative; flex:1; min-height:0; z-index:2;">
          <!-- swinging unit: each tag hangs from its own point (varied hangX) -->
          <div data-chime="1" data-cidx="{{ m.idx }}" style="position:absolute; left:calc(50% + {{ m.hangX }}px); top:0; transform-origin:top center; transform:translateX(-50%) rotate(0deg); display:flex; flex-direction:column; align-items:center; will-change:transform;">
            <!-- hanging cord -->
            <div style="width:0; height:{{ m.cordH }}px; border-left:1px solid rgba(255,255,255,0.45);"></div>
            <!-- flat tag card: big arc on the left, body extending right -->
            <div data-mtab="1" data-ctx="vkey" data-idx="{{ m.idx }}" data-has="{{ m.hasData }}" data-freq="{{ m.freq }}" onClick="{{ setMonth }}" style="position: relative; width: {{ cardW }}px; height: 38px; rotate: {{ m.tilt }}; transform: translateX({{ m.ox }}px); background: {{ m.bg }}; color: oklch(31% 0.105 44); border: 1px solid rgba(255,255,255,0.5); border-radius: {{ m.brad }}; box-shadow: 0 5px 12px -8px rgba(0,0,0,.42); display: flex; align-items: center; justify-content: center; padding: 0 14px; cursor: pointer; user-select: none; transition: background .15s ease, color .15s ease, border-color .15s ease, opacity .15s ease; overflow: hidden" data-comment-anchor="f3abf2b456-div">
              <div style="font:700 20px 'Cormorant Garamond',serif; letter-spacing:2px; color:inherit; line-height:1; text-shadow:0 1px 0 rgba(255,255,255,0.5);">{{ m.en }}</div>
            </div>
          </div>
        </div>
      </sc-for>
    </div>
  </div><div style="flex:1; min-width:0; display:flex; flex-direction:column;">

    <!-- mobile slim top bar (narrow only) — light airy frosted, soft lavender from the palm photo -->
    <div style="display:{{ topbarDisplay }}; flex-shrink:0; align-items:center; gap:10px; padding:0 14px; height:54px; background:linear-gradient(180deg, rgba(220,215,230,0.72), rgba(210,208,222,0.55)); -webkit-backdrop-filter:blur(20px) saturate(1.15); backdrop-filter:blur(20px) saturate(1.15);">
      <div onClick="{{ back }}" style="cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 5px 11px 5px 7px; border-radius: 7px; background: rgba(255,255,255,0.38); border: 1px solid rgba(255,255,255,0.5); flex-shrink: 0; transition: background .15s ease; border-width: 0px; padding-left: 12px; padding-top: 3px; padding-bottom: 6px; padding-right: 12px" style-hover="background:rgba(255,255,255,0.6);" style-active="background:rgba(255,255,255,0.28);">
        <span style="font-size: 15px; line-height: 1; color: oklch(28% 0.04 290); font-weight: 700; font-family: Verdana">⟨</span>
        
      </div>
      <div style="display:flex; align-items:center; margin:0 auto;">
        <div style="font: 700 28px 'Caveat',cursive; color: oklch(41% 0.112 45.904); line-height: 1; font-family: Georgia">{{ year }}</div>
      </div>
      <div style="width:52px; flex-shrink:0;"></div>
    </div>

    <!-- mobile month strip (narrow only) — chip cards with slight tilts, on a translucent lavender bar -->
    <div class="wb-strip" style="display: {{ stripDisplay }}; flex-shrink: 0; gap: 4px; overflow-x: auto; padding: 10px 14px 18px; -webkit-backdrop-filter: blur(20px) saturate(1.15); backdrop-filter: blur(20px) saturate(1.15); padding-bottom: 10px">
      <sc-for list="{{ monthTabs }}" as="m" hint-placeholder-count="2">
        <div data-mtab="1" data-ctx="hkey" data-idx="{{ m.idx }}" data-has="{{ m.hasData }}" data-freq="{{ m.freq }}" onClick="{{ setMonth }}" style="flex-shrink: 0; width: 80px; height: 45px; background: rgba(255,255,255,0.88); color: oklch(31% 0.105 44); border: 1px solid rgba(255,255,255,0.6); border-radius: 12px; box-shadow: 0 3px 9px -5px rgba(40,30,60,.22); display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; transition: background .15s ease, color .15s ease, border-color .15s ease, opacity .15s ease, box-shadow .15s ease">
          <div style="font:700 20px 'Cormorant Garamond',serif; letter-spacing:2px; line-height:1; color:inherit;">{{ m.en }}</div>
        </div>
      </sc-for>
    </div>

    <!-- reading area -->
    <div data-read="1" class="wb-scroll" style="flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; padding: {{ readPad }}">

      <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ false }}">
        <div style="max-width:560px; margin:12vh auto 0; text-align:center;">
          <div style="font:700 44px 'Caveat',cursive; color:oklch(40% 0.07 60); margin-top:6px;">{{ year }}</div>
          <div style="font-size:16px; margin-top:8px; color:oklch(35% 0.04 60);">这一年的微博还在整理中。</div>
        </div>
      </sc-if>

      <sc-if value="{{ hasChapter }}" hint-placeholder-val="{{ true }}">
        <div data-page="1" data-layer="panel" style="max-width: 800px; margin: 0 auto; padding: 22px 24px 30px; min-height: calc(100% - 2px); background: rgba(255,255,255,0.66); -webkit-backdrop-filter: blur(24px) saturate(108%); backdrop-filter: blur(24px) saturate(108%); border: 1px solid rgba(255,255,255,0.5); border-radius: 15px; box-shadow: 0 24px 60px -30px rgba(80,55,5,.5); border-width: 0px; padding-left: 38px; margin-top: 15px; margin-bottom: 15px">

          <!-- masthead card -->
          <div data-layer="card" style="display: flex; align-items: center; gap: 13px; background: rgba(255,255,255,0.82); -webkit-backdrop-filter: blur(10px) saturate(108%); backdrop-filter: blur(10px) saturate(108%); border-radius: 15px; box-shadow: 0 1px 2px rgba(0,0,0,.03), 0 10px 26px -18px rgba(70,50,10,.28); border: 1px solid rgba(255,255,255,0.7); padding: 15px 18px; margin-bottom: 14px; width: 100%; max-width: 720px; margin-top: 8px; border-width: 0px">
            <img src="assets/weibo/img/avatar.webp" alt="" style="width: 46px; height: 46px; border-radius: 50%; object-fit: cover; border: 2.5px solid oklch(85% 0.199 91.936); border-width: 0px">
            <div style="flex:1;">
              <div style="font-size: 17px; font-weight: 700; color: oklch(20% 0.02 60); font-family: Georgia">中二怪</div>
              <div style="font-size: 12px; color: oklch(50% 0.02 60); font-family: Georgia">Made of sterner stuff</div>
            </div>
            <div style="display:flex; align-items:baseline; gap:7px; padding:7px 14px; background:oklch(96.5% 0.013 92); border-radius:12px;">
              <span style="font: 700 17px 'Noto Serif SC',serif; color: oklch(28% 0.03 60); font-family: Georgia">{{ chapter.monthCn }}</span>
              <span style="font-size: 11.5px; color: oklch(56% 0.04 65); font-family: Georgia">{{ chapter.count }} 条</span>
            </div>
          </div>

          <!-- entries as cards -->
          <div style="display: flex; flex-direction: column; gap: 13px; width: 100%; max-width: 720px">
            <sc-for list="{{ chapter.posts }}" as="p" hint-placeholder-count="6">
              <div data-layer="card" style="background: rgba(255,255,255,0.82); -webkit-backdrop-filter: blur(10px) saturate(108%); backdrop-filter: blur(10px) saturate(108%); border-radius: 20px; box-shadow: 0 1px 2px rgba(0,0,0,.03), 0 10px 26px -18px rgba(70,50,10,.28); border: 1px solid rgba(255,255,255,0.7); padding: 17px 20px 15px; width: 100%; border-width: 0px">
                <div style="display:flex; align-items:baseline; gap:10px;">
                  <div style="font: 600 30px Georgia; color: oklch(45% 0.1 62); line-height: 1; font-size: 25px">{{ p.dayNum }}</div>
                  <div style="font: 600 12.5px Georgia; color: oklch(56% 0.04 65); letter-spacing:.4px;">{{ p.weekday }}<span style="margin:0 7px; opacity:.45;">·</span>{{ p.timeLabel }}</div>
                </div>
                <div data-body="post" style="font-size: 14.5px; line-height: 1.50; color: oklch(34% 0.012 67.558); margin-top: 9px; white-space: pre-wrap; text-wrap: pretty; font-family: Georgia; text-align: left">{{ p.text }}</div>
                <sc-if value="{{ p.hasRepost }}" hint-placeholder-val="{{ false }}">
                  <div style="margin-top:12px; padding:12px 14px; background:rgba(255,251,242,0.42); border-radius:12px; border-left:4px solid oklch(75% 0.183 55.934 / 0.7);" data-comment-anchor="50de8925ab-div">
                    <div data-body="quote" style="font-size: 14.5px; line-height: 1.78; color: oklch(40% 0.02 60); white-space: pre-wrap; text-wrap: pretty; font-family: Georgia">{{ p.repostText }}</div>
                    <sc-if value="{{ p.repostHasImg }}" hint-placeholder-val="{{ false }}">
                      <div style="display:grid; grid-template-columns:repeat({{ p.repostCols }},1fr); gap:6px; margin-top:10px; max-width:400px;">
                        <sc-for list="{{ p.repostImages }}" as="im" hint-placeholder-count="3">
                          <img src="{{ im }}" loading="lazy" decoding="async" alt="" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; background:oklch(92% 0.01 92);">
                        </sc-for>
                      </div>
                    </sc-if>
                  </div>
                </sc-if>
                <sc-if value="{{ p.hasImg }}" hint-placeholder-val="{{ false }}">
                  <div style="display:grid; grid-template-columns:repeat({{ p.cols }},1fr); gap:6px; margin-top:12px; max-width:440px;">
                    <sc-for list="{{ p.images }}" as="im" hint-placeholder-count="3">
                      <img src="{{ im }}" loading="lazy" decoding="async" alt="" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:10px; background:oklch(92% 0.01 92);">
                    </sc-for>
                  </div>
                </sc-if>
              </div>
            </sc-for>
          </div>

          <sc-if value="{{ monthEmpty }}" hint-placeholder-val="{{ false }}">
            <div data-layer="card" style="background: rgba(255,255,255,0.82); -webkit-backdrop-filter: blur(10px) saturate(108%); backdrop-filter: blur(10px) saturate(108%); border-radius: 18px; box-shadow: 0 1px 2px rgba(0,0,0,.03), 0 10px 26px -18px rgba(70,50,10,.28); border: 1px solid rgba(255,255,255,0.7); padding: 38px 24px; width: 100%; height: 440px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; border-width: 0px" data-comment-anchor="00bf1fd50b-div">
              <div style="font-size: 14px; color: oklch(52% 0.03 60); text-align: center; font-family: Georgia">这个月的微博还在整理中。</div>
            </div>
          </sc-if>

          <!-- chapter footer -->
          <div style="display:{{ pageMarkDisplay }}; align-items:center; gap:12px; padding:24px 0 4px;">
            
            <div style="flex: 1; text-align: center; font: 700 13.5px 'Noto Serif SC',serif; color: oklch(60% 0.05 65); letter-spacing: 1px; font-family: Georgia">{{ pageMark }}</div>
            
          </div>

        </div>
      </sc-if>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:860},&quot;forceMobile&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;手机端&quot;,&quot;label&quot;:&quot;模拟手机视图&quot;},&quot;mobileCardOpacity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.68,&quot;min&quot;:0.1,&quot;max&quot;:1,&quot;step&quot;:0.02,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;手机端&quot;,&quot;label&quot;:&quot;信息流卡片透明度&quot;},&quot;scatter&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:8,&quot;min&quot;:0,&quot;max&quot;:80,&quot;step&quot;:2,&quot;unit&quot;:&quot;px&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;月份风铃&quot;,&quot;label&quot;:&quot;左右错落距离&quot;},&quot;chimeOpacity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.95,&quot;min&quot;:0.05,&quot;max&quot;:1,&quot;step&quot;:0.05,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;月份风铃&quot;,&quot;label&quot;:&quot;月份卡片透明度&quot;},&quot;cardRadius&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:21,&quot;min&quot;:6,&quot;max&quot;:34,&quot;step&quot;:1,&quot;unit&quot;:&quot;px&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;月份风铃&quot;,&quot;label&quot;:&quot;卡片右侧弧度&quot;},&quot;cardWidth&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:120,&quot;min&quot;:90,&quot;max&quot;:190,&quot;step&quot;:2,&quot;unit&quot;:&quot;px&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;月份风铃&quot;,&quot;label&quot;:&quot;卡片宽度&quot;},&quot;panelOpacity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.36,&quot;min&quot;:0,&quot;max&quot;:1,&quot;step&quot;:0.02,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;桌面端信息流&quot;,&quot;label&quot;:&quot;中间层透明度（阅读面板）&quot;},&quot;cardOpacity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.3,&quot;min&quot;:0,&quot;max&quot;:1,&quot;step&quot;:0.02,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;桌面端信息流&quot;,&quot;label&quot;:&quot;顶层透明度（内容卡片）&quot;}}">
class Component extends DCLogic {
  allYears = [2019, 2020, 2021, 2022, 2023];
  defaults = { accentColor: '#D97742', baseColor: 'oklch(88% 0.14 92)', panelOpacity: 0.42, cardOpacity: 0.34 };
  state = { loaded: false, data: null, activeIdx: 0, w: window.innerWidth, year: 2019, empty: false, local: {} };

  theme(key) {
    const lv = this.state.local[key];
    if (lv != null) return lv;
    const pv = this.props[key];
    if (pv != null) return pv;
    return this.defaults[key];
  }
  resetTheme() {
    this.setState({ local: Object.assign({}, this.defaults) }, () => { this.applyTheme(); this.highlightActive(); });
  }

  componentDidMount() {
    const params = new URLSearchParams(location.search);
    const y = parseInt(params.get('year') || '2019', 10);
    this.setState({ year: y });
    this.loadYear(y);
    this._onResize = () => this.setState({ w: window.innerWidth });
    window.addEventListener('resize', this._onResize);
    window.addEventListener('orientationchange', this._onResize);
    this.applyTheme();
    // reading scrollbar fades in only while actively scrolling (mobile)
    const read = document.querySelector('[data-read]');
    if (read) {
      this._onReadScroll = () => {
        read.classList.add('sbon');
        clearTimeout(this._sbT);
        this._sbT = setTimeout(() => read.classList.remove('sbon'), 650);
      };
      read.addEventListener('scroll', this._onReadScroll, { passive: true });
    }
    // per-month navigation URLs (optional): pass via props.monthUrls = { 0:'/weibo/2026/01', ... }
    this.monthUrls = (this.props && this.props.monthUrls) || null;
    // wind sound + wind-chime physics run on wide screens only; mobile skips the whole audio system
    if (window.innerWidth >= 760) {
      this._wake = () => { this.ensureWind(); document.removeEventListener('pointerdown', this._wake); };
      document.addEventListener('pointerdown', this._wake, { once: true });
      try { this.startChime(); } catch (e) { console.error('chime', e); }
    }
  }
  componentWillUnmount() {
    window.removeEventListener('resize', this._onResize);
    window.removeEventListener('orientationchange', this._onResize);
    if (this.raf) cancelAnimationFrame(this.raf);
    document.removeEventListener('pointerdown', this._wake);
  }

  // ===== wind-chime pendulum physics =====
  startChime() {
    if (this.chimeStarted) return;
    this.chimeStarted = true;
    const N = 12;
    this.chimes = [];
    for (let i = 0; i < N; i++) {
      const f = i / (N - 1);          // 0 (top) .. 1 (bottom)
      this.chimes.push({
        theta: (Math.random() * 2 - 1) * 0.012,
        omega: 0,
        w0: 3.5 - f * 0.8,            // natural freq: lower cards slower
        damp: 0.52 - f * 0.16,        // lower cards keep more inertia / ring longer
        drive: 1.0 + f * 0.18,        // lower cards catch a touch more wind
        lag: f * 0.7,                 // phase lag down the column (gust desync)
      });
    }
    this.windState = { mode: 'calm', dir: 1, strength: 0, start: 0, dur: 0,
                       next: performance.now() / 1000 + 4 + Math.random() * 5 };
    this._noise = 0;
    this.lastNow = performance.now();
    const tick = (now) => {
      this.raf = requestAnimationFrame(tick);
      let dt = (now - this.lastNow) / 1000; this.lastNow = now;
      if (dt > 0.05) dt = 0.05; if (dt <= 0) return;
      const t = now / 1000;
      this.updateWind(t);
      this._noise += (Math.random() * 2 - 1) * 0.6 * dt; this._noise *= 0.95;
      const ws = this.windState;
      let env = 0;
      if (ws.mode !== 'calm') {
        const p = Math.max(0, Math.min(1, (t - ws.start) / ws.dur));
        env = Math.sin(p * Math.PI);                 // smooth fade in + out
      }
      const gust = ws.mode === 'gust';
      const baseForce = ws.dir * ws.strength * env;
      for (let i = 0; i < this.chimes.length; i++) {
        const c = this.chimes[i];
        let shape;
        if (gust) shape = 0.7 + 0.55 * Math.sin(t * 2.3 - c.lag * 2.0) + 0.18 * Math.sin(t * 5.1 - i);
        else      shape = 0.85 + 0.28 * Math.sin(t * 1.4 - c.lag * 0.6);
        const wind = baseForce * c.drive * shape + this._noise * 0.14;
        const alpha = -(c.w0 * c.w0) * Math.sin(c.theta) - c.damp * c.omega + wind;
        c.omega += alpha * dt;
        c.theta += c.omega * dt;
        if (c.theta > 0.92) { c.theta = 0.92; c.omega *= -0.3; }
        if (c.theta < -0.92) { c.theta = -0.92; c.omega *= -0.3; }
      }
      document.querySelectorAll('[data-chime]').forEach(el => {
        const c = this.chimes[parseInt(el.dataset.cidx, 10)];
        if (!c) return;
        el.style.transform = 'translateX(-50%) rotate(' + (c.theta * 57.2958).toFixed(2) + 'deg)';
      });
      this.updateWindSound(env, gust);
    };
    this.raf = requestAnimationFrame(tick);
  }

  updateWind(t) {
    const ws = this.windState;
    if (ws.mode === 'calm') {
      if (t >= ws.next) {
        const gust = Math.random() < 0.3;            // 30% gust, 70% breeze
        ws.mode = gust ? 'gust' : 'breeze';
        ws.dir = Math.random() < 0.5 ? -1 : 1;
        ws.start = t;
        ws.dur = gust ? (4 + Math.random() * 4) : (2 + Math.random() * 2);
        ws.strength = gust ? (3.0 + Math.random() * 1.7) : (1.5 + Math.random() * 0.7);
        this.ensureWind();
      }
    } else if (t - ws.start >= ws.dur) {
      ws.mode = 'calm';
      ws.next = t + 8 + Math.random() * 12;          // next event in 8..20s
    }
  }

  // ===== ambient wind sound =====
  ensureWind() {
    if (this.windReady) return;
    try {
      this.ensureAudio();
      const ac = this.ac;
      const dur = 2.5, len = Math.floor(ac.sampleRate * dur);
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      let last = 0;
      for (let i = 0; i < len; i++) { const wn = Math.random() * 2 - 1; last = (last + 0.02 * wn) / 1.02; d[i] = last * 3.2; }
      const src = ac.createBufferSource(); src.buffer = buf; src.loop = true;
      const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 420; lp.Q.value = 0.6;
      const bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 500; bp.Q.value = 0.5;
      const g = ac.createGain(); g.gain.value = 0;
      const wm = ac.createGain(); wm.gain.value = 1.0;   // dedicated wind bus, straight to output
      src.connect(lp); lp.connect(bp); bp.connect(g); g.connect(wm); wm.connect(ac.destination);
      src.start();
      this.windNoise = { src, lp, g };
      this.windReady = true;
    } catch (e) { /* audio unavailable */ }
  }
  updateWindSound(env, gust) {
    if (!this.windReady) return;
    const targetGain = env * (gust ? 0.46 : 0.2);
    const targetFreq = 360 + env * (gust ? 560 : 220);
    const g = this.windNoise.g.gain, f = this.windNoise.lp.frequency;
    g.value += (targetGain - g.value) * 0.08;
    f.value += (targetFreq - f.value) * 0.05;
  }

  loadYear(y) {
    fetch('data/weibo-' + y + '.json')
      .then(r => { if (!r.ok) throw new Error('no data'); return r.json(); })
      .then(d => {
        const fm = (d.months && d.months[0]) ? parseInt(d.months[0].split('-')[1], 10) - 1 : 0;
        this.setState({ loaded: true, data: d, activeIdx: fm, empty: false }, () => this.afterChange());
      })
      .catch(() => this.setState({ loaded: true, data: null, empty: true }));
  }

  componentDidUpdate() {
    if (this._lastIdx !== this.state.activeIdx) { this._lastIdx = this.state.activeIdx; this.afterChange(); }
    if (this._lastData !== this.state.data) { this._lastData = this.state.data; }
    this.highlightActive();
    this.applyTheme();
  }

  afterChange() {
    this.highlightActive();
    const read = document.querySelector('[data-read]');
    if (read) read.scrollTop = 0;
    const page = document.querySelector('[data-page]');
    if (page) { page.style.animation = 'none'; void page.offsetWidth; page.style.animation = 'chapterIn .4s ease'; }
  }

  // tweakable card values (props seed the editor; runtime falls back to these)
  tw(key, dflt) { const v = this.props && this.props[key]; return (v == null ? dflt : v); }
  // per-card opacity multipliers so tags aren't uniformly transparent
  opVar = [1.0, 0.86, 1.08, 0.92, 1.05, 0.8, 1.1, 0.9, 1.0, 0.84, 1.07, 0.94];
  cardOpAt(i) {
    const base = this.tw('chimeOpacity', 0.95);
    return Math.max(0.06, Math.min(0.95, base * this.opVar[i % 12]));
  }

  highlightActive() {
    const idx = this.state.activeIdx;
    const accent = this.theme('accentColor');
    document.querySelectorAll('[data-mtab]').forEach(el => {
      const on = parseInt(el.dataset.idx, 10) === idx;
      const has = el.dataset.has !== 'false';
      if (el.dataset.ctx === 'vkey') {
        el.style.background = on ? accent : ('rgba(255,255,255,' + this.cardOpAt(parseInt(el.dataset.idx, 10)).toFixed(3) + ')');
        el.style.color = on ? '#fff' : 'oklch(31% 0.105 44)';
        el.style.borderColor = on ? 'transparent' : 'rgba(255,255,255,0.5)';
        el.style.opacity = (on || has) ? '1' : '0.5';
        el.style.boxShadow = on ? '0 6px 14px -8px rgba(0,0,0,.5)' : '0 5px 12px -8px rgba(0,0,0,.42)';
      } else {
        // mobile month chip — white card on the light header, accent when selected
        el.style.background = on ? accent : ('rgba(255,255,255,' + this.cardOpAt(parseInt(el.dataset.idx, 10)).toFixed(3) + ')');
        el.style.color = on ? '#fff' : 'oklch(31% 0.105 44)';
        el.style.borderColor = on ? 'transparent' : 'rgba(120,130,105,0.22)';
        el.style.opacity = (on || has) ? '1' : '0.55';
        el.style.boxShadow = on ? '0 5px 14px -6px rgba(180,90,30,.5)' : '0 3px 9px -5px rgba(40,40,25,.28)';
      }
    });
  }
  applyTheme() {
    const wide = (window.innerWidth >= 760) && !(this.props && this.props.forceMobile);
    const panelOp = this.theme('panelOpacity');
    const cardOp = this.theme('cardOpacity');
    document.querySelectorAll('[data-basebg]').forEach(el => { el.style.background = 'rgba(16,24,10,0.34)'; el.style.backdropFilter = 'blur(14px) saturate(1.1)'; el.style.webkitBackdropFilter = 'blur(14px) saturate(1.1)'; });
    // swap background photo + veil per breakpoint
    const bgEl = document.querySelector('[data-bgphoto]');
    if (bgEl) {
      if (wide) {
        bgEl.style.backgroundImage = "url('assets/bg-bali.jpeg')";
        bgEl.style.backgroundPosition = 'center 66%';
        bgEl.style.filter = 'blur(1px) saturate(1.22) brightness(0.92)';
      } else {
        bgEl.style.backgroundImage = "url('uploads/bali-8477.jpg')";
        bgEl.style.backgroundPosition = 'center 40%';
        bgEl.style.filter = 'blur(1px) saturate(1.08) brightness(1.02)';
      }
    }
    document.querySelectorAll('[data-veil]').forEach(el => {
      if (wide) {
        el.style.background = 'linear-gradient(180deg, rgba(12,20,8,0.22) 0%, rgba(10,18,6,0.18) 50%, rgba(10,18,6,0.38) 100%)';
      } else {
        // no overlay on mobile — let the palm photo show clean
        el.style.background = 'none';
      }
    });
    document.querySelectorAll('[data-layer="panel"]').forEach(el => {
      if (wide) {
        el.style.background = 'rgba(255,255,255,' + panelOp + ')';
      } else {
        // mobile: drop the heavy frosted panel — read on a clean transparent column
        el.style.background = 'transparent';
        el.style.backdropFilter = 'none';
        el.style.webkitBackdropFilter = 'none';
        el.style.border = 'none';
        el.style.boxShadow = 'none';
        el.style.padding = '4px 7px 40px';
        el.style.marginTop = '4px';
        el.style.marginBottom = '0';
      }
    });
    document.querySelectorAll('[data-layer="card"]').forEach(el => {
      if (wide) {
        el.style.background = 'rgba(255,250,242,' + cardOp + ')';
        el.style.backdropFilter = 'blur(18px) saturate(1.18)';
        el.style.webkitBackdropFilter = 'blur(18px) saturate(1.18)';
        el.style.border = '1px solid rgba(255,243,226,0.55)';
        el.style.boxShadow = '0 1px 2px rgba(0,0,0,.03), 0 14px 34px -22px rgba(70,50,10,.4)';
      } else {
        // mobile: card opacity adjustable via tweak
        const mop = this.tw('mobileCardOpacity', 0.88);
        el.style.background = 'rgba(252,250,255,' + mop + ')';
        el.style.backdropFilter = 'blur(14px) saturate(1.1)';
        el.style.webkitBackdropFilter = 'blur(14px) saturate(1.1)';
        el.style.border = '1px solid rgba(255,255,255,0.6)';
        el.style.boxShadow = '0 4px 18px -10px rgba(40,30,60,.28)';
      }
    });
    document.querySelectorAll('[data-body]').forEach(el => {
      const quote = el.dataset.body === 'quote';
      el.style.fontSize = wide ? '14.5px' : (quote ? '15px' : '16px');
      el.style.lineHeight = wide ? (quote ? '1.78' : '1.95') : (quote ? '1.85' : '1.9');
      el.style.fontFamily = wide ? 'Georgia' : "'PingFang SC', -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif";
      el.style.letterSpacing = wide ? '' : '0.2px';
    });
    // mobile chip tilts — subtle scatter so they're not in a rigid line
    const chipTilts = [-2.5, 1.8, -3.2, 2.6, -1.9, 3.1, -2.3, 1.5, -3.0, 2.1, -1.6, 2.8];
    document.querySelectorAll('[data-ctx="hkey"]').forEach((el, i) => {
      el.style.transform = 'rotate(' + chipTilts[i % 12] + 'deg)';
    });
    const read = document.querySelector('[data-read]');
    if (read) read.classList.toggle('mobile-sb', !wide);
  }

  // ---- soft piano note on chapter turn (echoes the homepage) ----
  ensureAudio() {
    if (!this.ac) {
      const AC = window.AudioContext || window.webkitAudioContext;
      this.ac = new AC();
      this.master = this.ac.createGain(); this.master.gain.value = 0.32;
      this.lp = this.ac.createBiquadFilter(); this.lp.type = 'lowpass'; this.lp.frequency.value = 3200;
      this.lp.connect(this.master); this.master.connect(this.ac.destination);
    }
    if (this.ac.state === 'suspended') this.ac.resume();
  }
  playNote(freq) {
    if (!freq) return;
    this.ensureAudio();
    const ac = this.ac, t = ac.currentTime;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.5, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0005, t + 1.3);
    g.connect(this.lp);
    const o = ac.createOscillator(); o.type = 'triangle'; o.frequency.value = freq; o.connect(g);
    o.start(t); o.stop(t + 1.4);
  }

  setMonth = (e) => {
    const idx = parseInt(e.currentTarget.dataset.idx, 10);
    this.playNote(parseFloat(e.currentTarget.dataset.freq));
    this.ensureWind();
    // a click nudges only this tag — others keep swinging undisturbed
    if (this.chimes && this.chimes[idx]) this.chimes[idx].omega += (Math.random() < 0.5 ? -1 : 1) * 2.2;
    const url = this.monthUrls && this.monthUrls[idx];
    if (url) { window.location.href = url; return; }
    this.setState({ activeIdx: idx });
  };
  prevMonth = () => {
    this.setState({ pressedBtn: 'prev' });
    clearTimeout(this._btnT);
    this._btnT = setTimeout(() => this.setState(s => ({ activeIdx: Math.max(0, s.activeIdx - 1), pressedBtn: null })), 180);
  };
  nextMonth = () => {
    this.setState({ pressedBtn: 'next' });
    clearTimeout(this._btnT);
    this._btnT = setTimeout(() => this.setState(s => ({ activeIdx: Math.min(11, s.activeIdx + 1), pressedBtn: null })), 180);
  };
  back = () => { window.location.href = '微博年份选择首页.dc.html'; };

  gotoYear(y) { const p = new URLSearchParams(location.search); p.set('year', y); window.location.search = p.toString(); }
  prevYear = () => { const i = this.allYears.indexOf(this.state.year); if (i > 0) this.gotoYear(this.allYears[i - 1]); };
  nextYear = () => { const i = this.allYears.indexOf(this.state.year); if (i >= 0 && i < this.allYears.length - 1) this.gotoYear(this.allYears[i + 1]); };

  prep(p) {
    const day = p.dt.slice(8, 10), mon = p.dt.slice(5, 7), yr = p.dt.slice(0, 4);
    const wk = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
    const weekday = wk[new Date(parseInt(yr, 10), parseInt(mon, 10) - 1, parseInt(day, 10)).getDay()];
    const cols = p.images.length === 1 ? 1 : (p.images.length === 2 || p.images.length === 4) ? 2 : 3;
    const rImgs = p.repost ? p.repost.images : [];
    const rcols = rImgs.length === 1 ? 1 : (rImgs.length === 2 || rImgs.length === 4) ? 2 : 3;
    return {
      id: p.id, text: p.text,
      dayNum: parseInt(day, 10), weekday, timeLabel: p.dt.slice(11, 16),
      dayLabel: p.dt.slice(0, 4) + '年' + parseInt(mon, 10) + '月' + parseInt(day, 10) + '日  ·  ' + p.dt.slice(11, 16),
      hasImg: p.images.length > 0, images: p.images, cols,
      hasRepost: !!p.repost, repostText: p.repost ? p.repost.text : '',
      repostHasImg: rImgs.length > 0, repostImages: rImgs, repostCols: rcols,
    };
  }

  renderVals() {
    const { w, year } = this.state;
    const blurPx = 1;
    const bgPosY = '66%';
    const wide = (w >= 760) && !(this.props && this.props.forceMobile);
    const freqs = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46, 783.99];
    const rots = ['-1.2deg', '0.8deg', '-0.6deg', '1deg', '-1deg', '0.7deg', '-0.9deg', '1.1deg', '-0.7deg', '1deg', '-1deg', '0.6deg'];
    const mn = { '01': ['一月', 'Jan'], '02': ['二月', 'Feb'], '03': ['三月', 'Mar'], '04': ['四月', 'Apr'], '05': ['五月', 'May'], '06': ['六月', 'Jun'], '07': ['七月', 'Jul'], '08': ['八月', 'Aug'], '09': ['九月', 'Sep'], '10': ['十月', 'Oct'], '11': ['十一月', 'Nov'], '12': ['十二月', 'Dec'] };
    // mascot sits centered in the yellow gutter between the 172px nav and the centered feed panel
    const navW = 172, readW = w - navW;
    const mSize = 190;
    const panelW = Math.min(800, readW - 56);
    const gutter = 28 + Math.max(0, (readW - 56 - panelW) / 2);
    const showGutterPeng = wide;
    // ---- decorative background style ----
    const decor = 'off';
    const decorCfg = {
      off: { disp: 'none' },
      warm: {
        disp: 'block',
        gradient: 'radial-gradient(115% 85% at 78% -5%, rgba(255,255,255,0.42), rgba(255,255,255,0) 55%), linear-gradient(180deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0) 32%, rgba(150,95,20,0.07) 100%)',
        dotOpacity: 0.38,
        icebergTop: '-14px', icebergW: '380px', icebergOpacity: 0.4,
        icebergFilter: 'grayscale(0.2) sepia(0.75) saturate(1.5) hue-rotate(-8deg) brightness(1.08)'
      },
      frost: {
        disp: 'block',
        gradient: 'radial-gradient(120% 90% at 80% -8%, rgba(255,255,255,0.6), rgba(255,255,255,0) 58%), linear-gradient(180deg, rgba(214,236,247,0.28) 0%, rgba(255,255,255,0) 40%, rgba(120,160,190,0.12) 100%)',
        dotOpacity: 0.32,
        icebergTop: '-22px', icebergW: '460px', icebergOpacity: 0.7,
        icebergFilter: 'saturate(1.05) brightness(1.02)'
      }
    };
    const dc = decorCfg[decor] || decorCfg.warm;
    const base = {
      bgFilter: wide ? 'blur(' + blurPx + 'px) saturate(1.22) brightness(0.92)' : 'blur(3px) saturate(1.12) brightness(' + (1.12 - this.tw('mobileDarkness', 50) * 0.0024).toFixed(3) + ')',
      bgPosY,
      year,
      colDisplay: wide ? 'flex' : 'none',
      resetDisplay: wide ? 'flex' : 'none',
      pageMarkDisplay: wide ? 'flex' : 'none',
      gutterPengDisplay: showGutterPeng ? 'flex' : 'none',
      decorDisplay: (wide && dc.disp === 'block') ? 'block' : 'none',
      decorGradient: dc.gradient || 'none',
      decorDotOpacity: dc.dotOpacity != null ? dc.dotOpacity : 0,
      icebergTop: dc.icebergTop || '0px',
      icebergW: dc.icebergW || '380px',
      icebergOpacity: dc.icebergOpacity != null ? dc.icebergOpacity : 0,
      icebergFilter: dc.icebergFilter || 'none',
      gutterPengLeft: (navW - 78) + 'px',
      mascotW: mSize + 'px',
      topbarDisplay: wide ? 'none' : 'flex',
      stripDisplay: wide ? 'none' : 'flex',
      readPad: wide ? '30px 28px 64px' : '0 6px 36px',
      pagePad: wide ? '38px 52px 28px' : '22px 18px 24px',
      back: this.back, prevYear: this.prevYear, nextYear: this.nextYear, resetTheme: () => this.resetTheme(),
      setMonth: this.setMonth, prevMonth: this.prevMonth, nextMonth: this.nextMonth,
      prevBtnBg: this.state.pressedBtn === 'prev' ? 'oklch(55% 0.16 48)' : 'oklch(91% 0.045 70)',
      prevBtnColor: this.state.pressedBtn === 'prev' ? '#fff' : 'oklch(46% 0.07 62)',
      nextBtnBg: this.state.pressedBtn === 'next' ? 'oklch(55% 0.16 48)' : 'oklch(91% 0.045 70)',
      nextBtnColor: this.state.pressedBtn === 'next' ? '#fff' : 'oklch(46% 0.07 62)',
      monthTabs: [], cardW: Math.round(this.tw('cardWidth', 120)),
      chapter: { monthCn: '', enUp: '', count: 0, posts: [] },
      hasChapter: false, isEmpty: false, monthEmpty: false, readRadius: wide ? '24px 0 0 0' : '20px 20px 0 0',
      prevDisplay: 'none', nextDisplay: 'none', prevLabel: '', nextLabel: '', pageMark: '',
    };
    if (this.state.empty) return { ...base, isEmpty: true };
    const d = this.state.data;
    if (!d) return base;
    const allKeys = ['01', '02', '03', '04', '05', '06', '07', '08', '09', '10', '11', '12'];
    const mm = (ym) => ym.split('-')[1];
    const availSet = new Set((d.months || []).map(mm));
    const cv = [10, 13, 9, 12, 11, 14, 9, 12, 10, 13, 8, 11];                 // cord lengths
    const tlt = [-4, 5, -6, 3, 6, -3, -5, 7, -2, 4, -6, 5];                    // mixed rest lean (deg): some up, some down — non-parallel
    const hangVar = [-6, 4, -3, 6, -5, 3, -4, 5, -2, 6, -5, 3];                // each tag hangs from a slightly different point
    const stag = [-1, 0.7, -0.85, 1, -0.6, 0.9, -1, 0.8, -0.7, 1, -0.9, 0.7]; // horizontal stagger pattern
    // ---- tweakable knobs ----
    const scatter = this.tw('scatter', 8);           // left/right stagger distance (px)
    const arc = Math.round(this.tw('cardRadius', 21)); // big arc radius on the left end (px)
    const cardW = Math.round(this.tw('cardWidth', 120));
    // all tags share one orientation: big arc on the LEFT, body extending right
    const monthTabs = allKeys.map((k, i) => ({
      idx: i, mk: k, cn: mn[k][0], en: mn[k][1], freq: freqs[i], rot: rots[i],
      hasData: availSet.has(k), cordH: cv[i],
      tilt: tlt[i] + 'deg',
      hangX: 45 + hangVar[i],
      ox: Math.round(stag[i] * scatter),
      bg: 'rgba(255,255,255,' + this.cardOpAt(i).toFixed(3) + ')',
      brad: '8px ' + arc + 'px ' + arc + 'px 8px',
    }));
    const idx = Math.min(Math.max(this.state.activeIdx, 0), 11);
    const k = allKeys[idx], ym = year + '-' + k;
    const posts = d.posts.filter(p => p.ym === ym).map(p => this.prep(p));
    const hasPosts = posts.length > 0;
    const hasPrev = idx > 0, hasNext = idx < 11;
    return {
      ...base, monthTabs, hasChapter: true, monthEmpty: !hasPosts,
      chapter: { monthCn: mn[k][0], enUp: mn[k][1], count: posts.length, posts },
      prevDisplay: hasPrev ? 'flex' : 'none', nextDisplay: hasNext ? 'flex' : 'none',
      prevLabel: hasPrev ? mn[allKeys[idx - 1]][0] : '',
      nextLabel: hasNext ? mn[allKeys[idx + 1]][0] : '',
      pageMark: '· 第 ' + (idx + 1) + ' / 12 月 ·',
    };
  }
}
</script>
</body>
